<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="mark-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mark-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="200" fill="url(#mark-bg)"/>

  <!-- Grid pattern -->
  <pattern id="mark-grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#334155" stroke-width="0.5"/>
  </pattern>
  <rect width="400" height="200" fill="url(#mark-grid)" opacity="0.3"/>

  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="80" fill="#ec4899" opacity="0.05"/>
  <circle cx="300" cy="100" r="100" fill="#ec4899" opacity="0.05"/>

  <!-- Document representation -->
  <rect x="80" y="50" width="100" height="130" rx="8" fill="#1e293b" stroke="#ec4899" stroke-width="2" opacity="0.8"/>

  <!-- Document lines -->
  <rect x="95" y="70" width="70" height="6" rx="3" fill="#ec4899" opacity="0.6"/>
  <rect x="95" y="85" width="55" height="4" rx="2" fill="#475569" opacity="0.6"/>
  <rect x="95" y="95" width="65" height="4" rx="2" fill="#475569" opacity="0.6"/>
  <rect x="95" y="105" width="50" height="4" rx="2" fill="#475569" opacity="0.6"/>
  <rect x="95" y="120" width="70" height="6" rx="3" fill="#ec4899" opacity="0.4"/>
  <rect x="95" y="135" width="60" height="4" rx="2" fill="#475569" opacity="0.6"/>
  <rect x="95" y="145" width="55" height="4" rx="2" fill="#475569" opacity="0.6"/>
  <rect x="95" y="155" width="65" height="4" rx="2" fill="#475569" opacity="0.6"/>

  <!-- AI Review icon -->
  <circle cx="200" cy="100" r="25" fill="#ec4899" opacity="0.2"/>
  <path d="M192 95 L200 87 L208 95 L200 103 Z" fill="#ec4899"/>
  <path d="M195 105 L200 110 L205 105" fill="none" stroke="#ec4899" stroke-width="2" stroke-linecap="round"/>

  <!-- Arrow -->
  <line x1="195" y1="100" x2="220" y2="100" stroke="#ec4899" stroke-width="2" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- Result document -->
  <rect x="230" y="60" width="90" height="110" rx="8" fill="#1e293b" stroke="#ec4899" stroke-width="1" opacity="0.6"/>
  <rect x="245" y="80" width="60" height="5" rx="2" fill="#ec4899" opacity="0.5"/>
  <rect x="245" y="95" width="50" height="3" rx="1" fill="#475569" opacity="0.5"/>
  <rect x="245" y="105" width="55" height="3" rx="1" fill="#475569" opacity="0.5"/>

  <!-- Checkmark -->
  <circle cx="280" cy="140" r="12" fill="#ec4899" opacity="0.3"/>
  <path d="M274 140 L278 144 L286 136" fill="none" stroke="#ec4899" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Title -->
  <text x="350" y="170" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#ec4899">Mark</text>
  <text x="350" y="185" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#ec4899">Scientist</text>

  <!-- Coming Soon badge -->
  <rect x="305" y="40" width="80" height="22" rx="11" fill="#ec4899" opacity="0.2"/>
  <text x="345" y="55" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600" fill="#ec4899">Coming Soon</text>
</svg>
