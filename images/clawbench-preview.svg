<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="claw-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0F19;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="claw-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="200" fill="url(#claw-bg)"/>

  <!-- Grid pattern -->
  <pattern id="claw-grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#334155" stroke-width="0.5"/>
  </pattern>
  <rect width="400" height="200" fill="url(#claw-grid)" opacity="0.3"/>

  <!-- Dashboard-like sidebar -->
  <rect x="20" y="30" width="120" height="140" rx="8" fill="#1e293b" opacity="0.8"/>

  <!-- Sidebar items -->
  <rect x="30" y="45" width="100" height="20" rx="4" fill="#f59e0b" opacity="0.3"/>
  <rect x="30" y="75" width="100" height="20" rx="4" fill="#374151" opacity="0.5"/>
  <rect x="30" y="105" width="100" height="20" rx="4" fill="#374151" opacity="0.5"/>
  <rect x="30" y="135" width="100" height="20" rx="4" fill="#374151" opacity="0.5"/>

  <!-- Main content area -->
  <rect x="155" y="30" width="225" height="140" rx="8" fill="#1e293b" opacity="0.5"/>

  <!-- Task cards -->
  <rect x="165" y="45" width="100" height="50" rx="6" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1"/>
  <rect x="275" y="45" width="95" height="50" rx="6" fill="#374151" opacity="0.5"/>
  <rect x="165" y="105" width="100" height="55" rx="6" fill="#374151" opacity="0.5"/>
  <rect x="275" y="105" width="95" height="55" rx="6" fill="#374151" opacity="0.5"/>

  <!-- Active indicator -->
  <circle cx="175" cy="55" r="4" fill="#f59e0b"/>

  <!-- Title overlay -->
  <text x="280" y="75" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#f59e0b">Research</text>
  <text x="280" y="90" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#f59e0b">ClawBench</text>

  <!-- Progress bar -->
  <rect x="165" y="170" width="205" height="6" rx="3" fill="#374151"/>
  <rect x="165" y="170" width="120" height="6" rx="3" fill="url(#claw-accent)"/>
</svg>
